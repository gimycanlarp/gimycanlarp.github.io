href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{

    background:#f6f6f7;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

}

/* Soft background */

body::before,
body::after{

    content:"";

    position:fixed;

    width:550px;
    height:550px;

    border-radius:50%;

    filter:blur(140px);

    z-index:-1;

}

body::before{

    background:#ffffff;

    left:-120px;
    top:-120px;

}

body::after{

    background:#dfefff;

    right:-120px;
    bottom:-120px;

}

/* ENTER SCREEN */

#intro{

    position:fixed;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    background:#f6f6f7;

    z-index:100;

    transition:
        opacity .8s ease,
        filter .8s ease,
        visibility .8s;

}

#intro.hide{

    opacity:0;
    filter:blur(20px);
    visibility:hidden;

}

#intro h1{

    font-size:70px;
    color:#111;
    cursor:pointer;
    transition:.25s;

}

#intro h1:hover{

    transform:scale(1.05);

}

#intro p{

    color:#777;
    margin-top:15px;

}

/* Notification */

.notification{

    position:fixed;

    left:50%;
    top:-100px;

    transform:translateX(-50%);

    padding:15px 30px;

    border-radius:18px;

    background:rgba(255,255,255,.6);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.75);

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.35s;

    font-weight:600;

}

.notification.show{

    top:25px;

}

/* MAIN GLASS */

.container{

    width:720px;
    max-width:92%;

    padding:42px;

    text-align:center;

    border-radius:34px;

    background:rgba(255,255,255,.32);

    border:1px solid rgba(255,255,255,.75);

    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);

    box-shadow:

        0 20px 60px rgba(0,0,0,.08),

        inset 0 1px 1px rgba(255,255,255,.9);

    opacity:0;

    transform:translateY(30px);

    transition:
        opacity .8s,
        transform .8s;

}

.container.show{

    opacity:1;

    transform:translateY(0);

}

h2.title{

    font-size:56px;

    color:#111;

    margin-bottom:30px;

}

.section{

    background:rgba(255,255,255,.22);

    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,.6);

    border-radius:22px;

    padding:20px;

    margin:18px 0;

}

.section h3{

    margin-bottom:10px;

    color:#111;

}

.section p{

    color:#555;

    line-height:1.5;

}

.icons{

    display:flex;

    justify-content:center;

    gap:24px;

    margin-top:18px;

    flex-wrap:wrap;

}

.icons a,
.icons button{

    width:54px;
    height:54px;

    border:none;

    background:rgba(255,255,255,.3);

    border-radius:18px;

    backdrop-filter:blur(14px);

    display:flex;

    justify-content:center;
    align-items:center;

    text-decoration:none;

    color:#111;

    cursor:pointer;

    transition:.2s;

}

.icons a:hover,
.icons button:hover{

    transform:translateY(-4px);

    background:rgba(255,255,255,.5);

}

.icons i{

    font-size:26px;

}

.icons svg{

    width:26px;
    height:26px;

    fill:#111;

}

</style>

</head>

<body>

<div class="notification" id="notif">

            <!-- GitHub -->

</div>

</div>

</div>
<script>

const intro = document.getElementById("intro");
const container = document.getElementById("container");

let entered = false;

function openSite(){

    if(entered) return;

    entered = true;

    intro.classList.add("hide");

    setTimeout(()=>{

        container.classList.add("show");

    },200);

}

intro.addEventListener("click",openSite);

window.addEventListener("click",()=>{

    if(!entered){

        openSite();

    }

},{once:true});

window.addEventListener("keydown",(e)=>{

    if(e.key==="Enter" || e.key===" "){

        openSite();

    }

});

/* --------------------------
   Notification Popup
--------------------------- */

const notif = document.getElementById("notif");

let popupTimeout;

function popup(text){

    notif.textContent = text;

    notif.classList.add("show");

    clearTimeout(popupTimeout);

    popupTimeout = setTimeout(()=>{

        notif.classList.remove("show");

    },1000);

}

/* Discord */

document
.getElementById("discord")
.addEventListener("click",()=>{

    popup("gimycan");

});

/* Roblox */

document
.getElementById("roblox")
.addEventListener("click",()=>{

    popup("gimycan12");

});

/* --------------------------
   Small Hover Animation
--------------------------- */

document
.querySelectorAll(".icons a, .icons button")
.forEach(icon=>{

    icon.addEventListener("mouseenter",()=>{

        icon.style.transform =
            "translateY(-4px) scale(1.08)";

    });

    icon.addEventListener("mouseleave",()=>{

        icon.style.transform = "";

    });

});

</script>
