<!DOCTYPE html>

<meta charset="UTF-8">
<title>Flowey Garden</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #FFD800;
  font-family: 'Press Start 2P', monospace;
}

/* TITLE */
header {
  text-align: center;
  padding: 20px;
  font-size: 18px;
}

/* LAYOUT */
.container {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  gap: 20px;
}

.left, .right {
  width: 48%;
}

/* SEARCH */
input {
  width: 100%;
  padding: 12px;
  background: black;
  border: 2px solid #FFD800;
  color: #FFD800;
  font-family: inherit;
  outline: none;
}

/* SUGGESTIONS */
.suggestions div {
  padding: 10px;
  cursor: pointer;
}

.suggestions div:hover {
  background: #FFD800;
  color: black;
}

/* DROPDOWN */
.dropdown-btn {
  cursor: pointer;
  font-size: 10px;
  opacity: 0.9;
}

.dropdown {
  display: none;
  margin-top: 10px;
  max-height: 740px;
  overflow-y: auto;
  border: 1px solid #FFD800;
}

.game {
  padding: 10px;
  cursor: pointer;
}

.game:hover {
  background: #FFD800;
  color: black;
}

/* FLOWEY */
#flowey {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  image-rendering: pixelated;
}

/* LAUNCH BUTTON */
#launchBtn {
  display: none;
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 30px;
  font-family: inherit;
  background: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

#launchBtn:hover {
  transform: translateX(-50%) scale(1.05);
}
</style>
</head>

<body>

<header>FLOWEY GARDEN</header>

<div class="container">

  <div class="left">
    <input id="search" placeholder="search games...">
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="right">
    <div class="dropdown-btn" onclick="toggleDropdown()">
      what's available?
    </div>
    <div class="dropdown" id="dropdown"></div>
  </div>

</div>

<img id="flowey" src="https://gimycanlarp.github.io/games/FloweyWarning.gif">

<button id="launchBtn">launch</button>

<script>

let win;

/* =========================
   SIMPLE LAUNCHER (NEW SYSTEM)
   ========================= */
function launch(file) {

  var url = "https://gimycanlarp.github.io/games/" + file;

  if (win) win.close();

  win = window.open();

  win.document.body.style.margin = "0";
  win.document.body.style.height = "100vh";

  var iframe = win.document.createElement("iframe");

  iframe.style.border = "none";
  iframe.style.width = "100%";
  iframe.style.height = "100%";
  iframe.style.margin = "0";

  iframe.src = url;

  win.document.body.appendChild(iframe);
}

/* =========================
   GAME SELECT (NOW DIRECT LAUNCH READY)
   ========================= */
function setGame(file) {
  document.getElementById("launchBtn").style.display = "block";

  document.getElementById("launchBtn").onclick = () => {
    launch(file);
  };
}

/* BUTTON */
document.getElementById("launchBtn").onclick = function() {};

/* DROPDOWN */
function toggleDropdown() {
  let d = document.getElementById("dropdown");
  d.style.display = (d.style.display === "block") ? "none" : "block";
}

</script>

</body>
</html>

/* CLEAN NAME */
function cleanName(f) {
  return f.replace(".html","").replace(/_/g," ");
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
  let val = this.value.toLowerCase();
  let box = document.getElementById("suggestions");
  box.innerHTML = "";

  if (!val) return;

  let matches = games.filter(g =>
    cleanName(g).toLowerCase().includes(val)
  ).slice(0,20);

  if (matches.length === 0) {
    box.innerHTML = `<div style="opacity:0.5">but nobody came</div>`;
    return;
  }

  matches.forEach(g => {
    let div = document.createElement("div");
    div.innerText = cleanName(g);
    div.onclick = () => setGame(g);
    box.appendChild(div);
  });
});

/* DROPDOWN */
let dropdown = document.getElementById("dropdown");

games.forEach(g => {
  let div = document.createElement("div");
  div.className = "game";
  div.innerText = cleanName(g);
  div.onclick = () => setGame(g);
  dropdown.appendChild(div);
});
